<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background charcoal com cantos arredondados -->
  <rect width="32" height="32" rx="6" fill="#15110A"/>

  <!-- Borda interna âmbar sutil -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="4.5"
        fill="none" stroke="#E4A250" stroke-width="0.5" opacity="0.3"/>

  <!-- G (âmbar) — path contínuo, cantos arredondados -->
  <path d="M14,8 L3,8 L3,24 L14,24 L14,16 L8,16"
        fill="none"
        stroke="#E4A250"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- H (cream) — duas barras verticais + crossbar -->
  <path d="M18,8 L18,24 M18,16 L29,16 M29,8 L29,24"
        fill="none"
        stroke="#F5F0E8"
        stroke-width="2.5"
        stroke-linecap="round"/>
</svg>
